<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI 聊天测试</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 700px;
      margin: 50px auto;
      padding: 20px;
      background: #f7f7f8;
    }
    #chat-box {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      height: 400px;
      overflow-y: auto;
      margin-bottom: 20px;
      white-space: pre-wrap;
    }
    .user-msg {
      color: #1a73e8;
      margin-bottom: 10px;
    }
    .ai-msg {
      color: #222;
      margin-bottom: 20px;
    }
    .error {
      color: #d93025;
    }
    textarea {
      width: 100%;
      height: 60px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
    }
    button {
      margin-top: 10px;
      padding: 10px 25px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled {
      background: #93b8f0;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h2>🤖 AI 助手</h2>
  <div id="chat-box"></div>
  <textarea id="user-input" placeholder="输入消息，按 Ctrl + Enter 发送"></textarea>
  <button id="send-btn">发送</button>

  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // 追加一段文本到聊天框
    function appendMessage(role, text) {
      const div = document.createElement('div');
      div.className = role === 'user' ? 'user-msg' : 'ai-msg';
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 创建一个正在输入中的 AI 消息占位
    function createStreamingDiv() {
      const div = document.createElement('div');
      div.className = 'ai-msg';
      div.id = 'streaming';
      chatBox.appendChild(div);
      return div;
    }

    // 移除占位 id，表示流结束
    function finishStreaming(div) {
      div.removeAttribute('id');
    }

    // 发送请求并处理 SSE 流
    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      // 显示用户消息
      appendMessage('user', message);
      userInput.value = '';
      sendBtn.disabled = true;

      // 创建 AI 消息占位
      const aiDiv = createStreamingDiv();
      let fullResponse = '';

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.detail || `HTTP ${response.status}`);
        }

        // 以流的方式读取响应体
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          // 解码并拼接到缓冲区
          buffer += decoder.decode(value, { stream: true });

          // SSE 事件以 \n\n 分隔
          const parts = buffer.split('\n\n');
          // 最后一段可能不完整，留着下次处理
          buffer = parts.pop();

          for (const part of parts) {
            if (!part.startsWith('data: ')) continue;
            const dataStr = part.slice(6);
            if (dataStr === '[DONE]') {
              finishStreaming(aiDiv);
              return;
            }
            try {
              const data = JSON.parse(dataStr);
              if (data.error) {
                aiDiv.innerHTML += `<span class="error">[错误] ${data.error.message}</span>`;
                finishStreaming(aiDiv);
                return;
              }
              if (data.content) {
                fullResponse += data.content;
                aiDiv.textContent = fullResponse;
                chatBox.scrollTop = chatBox.scrollHeight;
              }
            } catch (e) {
              // 忽略解析错误的行
            }
          }
        }
        // 循环结束但未收到 [DONE]，视为正常结束
        finishStreaming(aiDiv);
      } catch (error) {
        aiDiv.innerHTML += `<span class="error">[请求失败] ${error.message}</span>`;
        finishStreaming(aiDiv);
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
