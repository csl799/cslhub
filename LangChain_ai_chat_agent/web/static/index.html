<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 对话</title>
  <style>
    :root {
      --bg: #eef0f4;
      --panel: #fff;
      --border: #d8dce6;
      --text: #1a1d26;
      --muted: #6b7280;
      --user-bg: #dbeafe;
      --bot-bg: #f3f4f6;
      --accent: #2563eb;
      --sidebar: #fafbfc;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, "Segoe UI", Roboto, "PingFang SC", sans-serif; background: var(--bg); color: var(--text); }
    #auth { max-width: 380px; margin: 3rem auto; padding: 1.5rem; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; }
    #auth h2 { margin: 0 0 1rem; font-size: 1.1rem; color: var(--muted); }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tabs button { flex: 1; padding: 0.4rem; border: 1px solid var(--border); background: #f9fafb; cursor: pointer; border-radius: 6px; }
    .tabs button.on { background: var(--accent); color: #fff; border-color: var(--accent); }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin: 0.5rem 0 0.2rem; }
    input { width: 100%; padding: 0.5rem 0.6rem; border: 1px solid var(--border); border-radius: 6px; font: inherit; }
    #auth button.submit { width: 100%; margin-top: 1rem; padding: 0.55rem; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    #app { display: none; height: 100vh; }
    #app.show { display: flex; }
    #sidebar { width: 260px; min-width: 200px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    #sidebar h3 { margin: 0; padding: 0.85rem 1rem; font-size: 0.85rem; color: var(--muted); border-bottom: 1px solid var(--border); }
    #userbar { padding: 0.75rem 1rem; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
    #convList { flex: 1; overflow-y: auto; padding: 0.35rem 0; }
    .conv { padding: 0.55rem 1rem; cursor: pointer; font-size: 0.88rem; border-left: 3px solid transparent; }
    .conv:hover { background: #eef2ff; }
    .conv.on { background: #e0e7ff; border-left-color: var(--accent); }
    .conv .t { font-weight: 500; }
    .conv .d { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }
    #sbActions { padding: 0.6rem 0.75rem; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 0.35rem; }
    #sbActions button { width: 100%; padding: 0.45rem; border-radius: 6px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 0.82rem; }
    #sbActions button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #mainHead { padding: 0.65rem 1rem; border-bottom: 1px solid var(--border); background: var(--panel); font-size: 0.9rem; color: var(--muted); }
    #log { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; background: var(--panel); }
    .msg { max-width: 92%; padding: 0.6rem 0.8rem; border-radius: 10px; line-height: 1.5; font-size: 0.92rem; word-break: break-word; }
    .msg.user { align-self: flex-end; background: var(--user-bg); border: 1px solid #bfdbfe; white-space: pre-wrap; }
    .msg.assistant { align-self: flex-start; background: var(--bot-bg); border: 1px solid var(--border); }
    .msg .label { font-size: 0.68rem; color: var(--muted); margin-bottom: 0.25rem; }
    .think-block { font-size: 0.85rem; color: var(--muted); border-left: 3px solid #c5cad6; padding: 0.3rem 0 0.3rem 0.6rem; margin-bottom: 0.55rem; white-space: pre-wrap; }
    .think-title { font-weight: 600; font-size: 0.72rem; margin-bottom: 0.2rem; }
    .answer-title { font-weight: 600; font-size: 0.72rem; margin-bottom: 0.2rem; }
    .answer-block { white-space: pre-wrap; }
    .composer { border-top: 1px solid var(--border); padding: 0.65rem 1rem; display: flex; gap: 0.45rem; align-items: flex-end; background: var(--panel); }
    textarea { flex: 1; resize: none; min-height: 44px; max-height: 120px; padding: 0.55rem 0.65rem; border: 1px solid var(--border); border-radius: 8px; font: inherit; }
    textarea:focus { outline: none; border-color: var(--accent); }
    .composer button { height: 44px; padding: 0 1rem; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; }
    .composer button:disabled { opacity: 0.5; cursor: not-allowed; }
    .err { color: #b91c1c; font-size: 0.82rem; padding: 0 1rem 0.4rem; }
  </style>
</head>
<body>
  <div id="auth">
    <h2>登录 / 注册</h2>
    <div class="tabs">
      <button type="button" id="tabLogin" class="on">登录</button>
      <button type="button" id="tabReg">注册</button>
    </div>
    <div id="formLogin">
      <label>用户名</label>
      <input id="loginUser" autocomplete="username" />
      <label>密码</label>
      <input id="loginPass" type="password" autocomplete="current-password" />
      <button type="button" class="submit" id="btnLogin">登录</button>
    </div>
    <div id="formReg" style="display:none">
      <label>用户名（3～32，字母数字下划线或中文）</label>
      <input id="regUser" autocomplete="username" />
      <label>密码（至少 6 位）</label>
      <input id="regPass" type="password" autocomplete="new-password" />
      <button type="button" class="submit" id="btnReg">注册并登录</button>
    </div>
    <div id="authErr" class="err" hidden></div>
  </div>

  <div id="app">
    <aside id="sidebar">
      <h3>我的会话</h3>
      <div id="userbar"></div>
      <div id="convList"></div>
      <div id="sbActions">
        <button type="button" class="primary" id="btnNewConv">开启新会话</button>
        <button type="button" id="btnLogout">退出登录</button>
      </div>
    </aside>
    <div id="main">
      <div id="mainHead">请选择或新建一个会话后开始对话</div>
      <div id="log" aria-live="polite"></div>
      <div id="chatErr" class="err" hidden></div>
      <form class="composer" id="chatForm">
        <textarea id="chatInput" rows="2" placeholder="输入消息… Enter 发送" disabled required></textarea>
        <button type="submit" id="chatSend" disabled>发送</button>
      </form>
    </div>
  </div>

  <script>
    const TOKEN_KEY = "access_token";
    let currentConvId = null;
    let meName = "";

    function token() { return localStorage.getItem(TOKEN_KEY); }
    function authHeaders() {
      const t = token();
      return t ? { Authorization: "Bearer " + t, "Content-Type": "application/json" } : { "Content-Type": "application/json" };
    }

    function showAuthErr(msg) {
      const el = document.getElementById("authErr");
      el.hidden = !msg;
      el.textContent = msg || "";
    }
    function showChatErr(msg) {
      const el = document.getElementById("chatErr");
      el.hidden = !msg;
      el.textContent = msg || "";
    }

    function switchTab(reg) {
      document.getElementById("tabLogin").classList.toggle("on", !reg);
      document.getElementById("tabReg").classList.toggle("on", reg);
      document.getElementById("formLogin").style.display = reg ? "none" : "block";
      document.getElementById("formReg").style.display = reg ? "block" : "none";
      showAuthErr("");
    }

    async function tryEnterApp() {
      const t = token();
      if (!t) return false;
      const res = await fetch("/api/auth/me", { headers: authHeaders() });
      if (!res.ok) { localStorage.removeItem(TOKEN_KEY); return false; }
      const u = await res.json();
      meName = u.username;
      document.getElementById("auth").style.display = "none";
      document.getElementById("app").classList.add("show");
      document.getElementById("userbar").textContent = "@" + u.username;
      await refreshConversations();
      return true;
    }

    async function refreshConversations() {
      const res = await fetch("/api/conversations", { headers: authHeaders() });
      if (!res.ok) return;
      const list = await res.json();
      const box = document.getElementById("convList");
      box.innerHTML = "";
      for (const c of list) {
        const div = document.createElement("div");
        div.className = "conv" + (c.id === currentConvId ? " on" : "");
        div.dataset.id = c.id;
        const t = document.createElement("div");
        t.className = "t";
        t.textContent = c.title || "新会话";
        const d = document.createElement("div");
        d.className = "d";
        d.textContent = (c.updated_at || "").replace("T", " ").slice(0, 16);
        div.appendChild(t);
        div.appendChild(d);
        div.onclick = () => selectConv(c.id, c.title);
        box.appendChild(div);
      }
    }

    function selectConv(id, title) {
      currentConvId = id;
      document.querySelectorAll(".conv").forEach((el) => el.classList.toggle("on", +el.dataset.id === id));
      document.getElementById("mainHead").textContent = "当前会话 #" + id + " · " + (title || "");
      document.getElementById("log").innerHTML = "";
      document.getElementById("chatInput").disabled = false;
      document.getElementById("chatSend").disabled = false;
      showChatErr("");
    }

    async function newConversation() {
      const res = await fetch("/api/conversations", { method: "POST", headers: authHeaders() });
      if (!res.ok) { showChatErr("创建会话失败"); return; }
      const c = await res.json();
      await refreshConversations();
      selectConv(c.id, c.title);
    }

    document.getElementById("tabLogin").onclick = () => switchTab(false);
    document.getElementById("tabReg").onclick = () => switchTab(true);

    document.getElementById("btnLogin").onclick = async () => {
      showAuthErr("");
      const body = { username: document.getElementById("loginUser").value.trim(), password: document.getElementById("loginPass").value };
      const res = await fetch("/api/auth/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { showAuthErr(data.detail || "登录失败"); return; }
      localStorage.setItem(TOKEN_KEY, data.access_token);
      await tryEnterApp();
    };

    document.getElementById("btnReg").onclick = async () => {
      showAuthErr("");
      const body = { username: document.getElementById("regUser").value.trim(), password: document.getElementById("regPass").value };
      const res = await fetch("/api/auth/register", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { showAuthErr(data.detail || "注册失败"); return; }
      localStorage.setItem(TOKEN_KEY, data.access_token);
      await tryEnterApp();
    };

    document.getElementById("btnLogout").onclick = async () => {
      const t = token();
      if (t) await fetch("/api/auth/logout", { method: "POST", headers: { Authorization: "Bearer " + t } }).catch(() => {});
      localStorage.removeItem(TOKEN_KEY);
      location.reload();
    };

    document.getElementById("btnNewConv").onclick = newConversation;

    function appendUser(text) {
      const log = document.getElementById("log");
      const wrap = document.createElement("div");
      wrap.className = "msg user";
      const lab = document.createElement("div");
      lab.className = "label";
      lab.textContent = "你";
      const body = document.createElement("div");
      body.textContent = text;
      wrap.appendChild(lab);
      wrap.appendChild(body);
      log.appendChild(wrap);
      log.scrollTop = log.scrollHeight;
    }

    function beginAssistant() {
      const log = document.getElementById("log");
      const wrap = document.createElement("div");
      wrap.className = "msg assistant";
      const lab = document.createElement("div");
      lab.className = "label";
      lab.textContent = "助手";
      const thinkWrap = document.createElement("div");
      thinkWrap.className = "think-block";
      const thinkTitle = document.createElement("div");
      thinkTitle.className = "think-title";
      thinkTitle.textContent = "正在思考";
      const thinkBody = document.createElement("div");
      thinkWrap.appendChild(thinkTitle);
      thinkWrap.appendChild(thinkBody);
      const ansTitle = document.createElement("div");
      ansTitle.className = "answer-title";
      ansTitle.textContent = "答案";
      const ansBody = document.createElement("div");
      ansBody.className = "answer-block";
      wrap.appendChild(lab);
      wrap.appendChild(thinkWrap);
      wrap.appendChild(ansTitle);
      wrap.appendChild(ansBody);
      log.appendChild(wrap);
      log.scrollTop = log.scrollHeight;
      return { thinkWrap, thinkBody, ansBody };
    }

    async function consumeSSE(res, { thinkWrap, thinkBody, ansBody }) {
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buffer = "";
      let noAnswerMarker = false;
      const handle = (ev, dataLine) => {
        if (ev === "meta") {
          const o = JSON.parse(dataLine);
          noAnswerMarker = !!o.no_answer_marker;
          return;
        }
        if (ev === "thinking") {
          const o = JSON.parse(dataLine);
          thinkBody.textContent += o.delta || "";
          document.getElementById("log").scrollTop = document.getElementById("log").scrollHeight;
          return;
        }
        if (ev === "answer") {
          const o = JSON.parse(dataLine);
          ansBody.textContent += o.delta || "";
          document.getElementById("log").scrollTop = document.getElementById("log").scrollHeight;
          return;
        }
        if (ev === "error") {
          const o = JSON.parse(dataLine);
          throw new Error(o.error || "流式错误");
        }
      };
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += dec.decode(value, { stream: true });
        const parts = buffer.split("\n\n");
        buffer = parts.pop() || "";
        for (const block of parts) {
          if (!block.trim()) continue;
          let ev = "message";
          let data = "";
          for (const line of block.split("\n")) {
            if (line.startsWith("event:")) ev = line.slice(6).trim();
            else if (line.startsWith("data:")) data += line.slice(5).trimStart();
          }
          if (ev === "done") continue;
          handle(ev, data);
        }
      }
      if (noAnswerMarker && !ansBody.textContent.trim() && thinkBody.textContent.trim()) {
        ansBody.textContent = thinkBody.textContent.trim();
        thinkBody.textContent = "";
      }
      if (!thinkBody.textContent.trim()) thinkWrap.style.display = "none";
    }

    document.getElementById("chatForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentConvId) { showChatErr("请先新建或选择一个会话"); return; }
      const text = document.getElementById("chatInput").value.trim();
      if (!text) return;
      showChatErr("");
      appendUser(text);
      document.getElementById("chatInput").value = "";
      const sendBtn = document.getElementById("chatSend");
      sendBtn.disabled = true;
      const { thinkWrap, thinkBody, ansBody } = beginAssistant();
      try {
        const res = await fetch("/api/chat/stream", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({ message: text, conversation_id: currentConvId }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          const d = data.detail;
          const msg = typeof d === "string" ? d : Array.isArray(d) ? d.map((x) => x.msg).join("; ") : res.statusText;
          throw new Error(msg || "请求失败");
        }
        await consumeSSE(res, { thinkWrap, thinkBody, ansBody });
        await refreshConversations();
      } catch (err) {
        showChatErr(String(err.message || err));
      } finally {
        sendBtn.disabled = false;
        document.getElementById("chatInput").focus();
      }
    });

    document.getElementById("chatInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        document.getElementById("chatForm").requestSubmit();
      }
    });

    (async () => {
      await tryEnterApp();
    })();
  </script>
</body>
</html>
